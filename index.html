<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PlayLearn</title>
<meta name="description" content="PlayLearn - learning games and stories for kids in English, German and Bulgarian.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Nunito supports Latin + Cyrillic. If offline, system fonts are used as fallback. -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&subset=cyrillic&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🦊</text></svg>">
</head>
<body>
<div id="app">
  <header class="topbar" id="topbar"></header>
  <main id="screen"></main>
</div>
<div id="overlay-root"></div>

<!-- Data (plain JS constants so the app also runs from file://) -->
<script src="js/data/translations.js"></script>
<script src="js/data/vocab.js"></script>
<script src="js/data/stories.js"></script>
<!-- Core -->
<script src="js/util.js"></script>
<script src="js/characters.js"></script>
<script src="js/storage.js"></script>
<script src="js/audio.js"></script>
<script src="js/i18n.js"></script>
<script src="js/progress.js"></script>
<!-- Games (each defines one global game object) -->
<script src="js/games/crossword.js"></script>
<script src="js/games/sudoku.js"></script>
<script src="js/games/math.js"></script>
<script src="js/games/memory.js"></script>
<script src="js/games/wordsearch.js"></script>
<script src="js/games/quiz.js"></script>
<script src="js/games/registry.js"></script>
<!-- Story engine -->
<script src="js/story/story.js"></script>
<!-- App shell (must be last) -->
<script src="js/app.js"></script>
</body>
</html>
